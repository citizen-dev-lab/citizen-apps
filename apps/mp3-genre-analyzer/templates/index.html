<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Genre Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  font-family:'Segoe UI','Hiragino Sans',sans-serif;
  background:linear-gradient(135deg,#0a0a1a 0%,#1a1040 50%,#0d1a2e 100%);
  color:#e0e0f0;
  display:flex;justify-content:center;align-items:center;
  padding:24px;
}
.container{
  width:100%;max-width:560px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  backdrop-filter:blur(16px);
  padding:40px 32px;
  text-align:center;
}
h1{font-size:1.6rem;margin-bottom:6px;letter-spacing:.02em}
.subtitle{font-size:.9rem;color:#8888aa;margin-bottom:28px}

/* ---------- Upload Zone ---------- */
.drop-zone{
  border:2px dashed rgba(160,140,255,.4);
  border-radius:16px;
  padding:48px 24px;
  cursor:pointer;
  transition:border-color .25s,background .25s;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:#a78bfa;
  background:rgba(167,139,250,.08);
}
.drop-zone .icon{font-size:3rem;margin-bottom:12px;display:block}
.drop-zone p{color:#9999bb;font-size:.95rem;line-height:1.6}
.drop-zone .btn{
  display:inline-block;margin-top:16px;
  padding:10px 28px;
  border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;font-size:.9rem;cursor:pointer;
  transition:opacity .2s;
}
.drop-zone .btn:hover{opacity:.85}
input[type=file]{display:none}

/* ---------- File name ---------- */
.file-name{
  margin-top:14px;font-size:.85rem;color:#a78bfa;
  word-break:break-all;
}

/* ---------- Loading ---------- */
.loading{display:none;margin-top:32px}
.spinner{
  width:48px;height:48px;margin:0 auto 16px;
  border:4px solid rgba(167,139,250,.2);
  border-top-color:#a78bfa;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#9999bb;font-size:.9rem}

/* ---------- Results ---------- */
.results{display:none;margin-top:32px;text-align:left}
.results h2{font-size:1.1rem;margin-bottom:16px;text-align:center}
.result-item{margin-bottom:14px}
.result-label{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:4px;font-size:.9rem;
}
.result-label .genre{font-weight:600}
.result-label .parent{font-size:.75rem;color:#8888aa;margin-left:6px}
.result-label .pct{color:#a78bfa;font-weight:600}
.bar-bg{
  height:8px;border-radius:4px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,#7c3aed,#4f46e5);
  transition:width .6s ease;
}

/* ---------- Error ---------- */
.error{
  display:none;margin-top:24px;
  padding:14px;border-radius:10px;
  background:rgba(239,68,68,.12);
  color:#f87171;font-size:.9rem;
}

/* ---------- Reset ---------- */
.reset-btn{
  display:none;margin:24px auto 0;
  padding:8px 24px;
  border:1px solid rgba(167,139,250,.3);
  border-radius:8px;
  background:transparent;color:#a78bfa;
  font-size:.85rem;cursor:pointer;
  transition:background .2s;
}
.reset-btn:hover{background:rgba(167,139,250,.1)}
</style>
</head>
<body>
<div class="container">
  <h1>MP3 Genre Analyzer</h1>
  <p class="subtitle">MP3ファイルから音楽ジャンルをAI解析</p>

  <div class="drop-zone" id="dropZone">
    <span class="icon">&#9835;</span>
    <p>ここにMP3ファイルをドロップ</p>
    <p>または</p>
    <button class="btn" type="button" id="selectBtn">ファイルを選択</button>
    <input type="file" id="fileInput" accept=".mp3,audio/mpeg">
  </div>
  <div class="file-name" id="fileName"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>解析中です…しばらくお待ちください</p>
  </div>

  <div class="results" id="results">
    <h2>解析結果</h2>
    <div id="resultList"></div>
  </div>

  <div class="error" id="error"></div>

  <button class="reset-btn" id="resetBtn">別のファイルを解析する</button>
</div>

<script>
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const selectBtn  = document.getElementById('selectBtn');
const fileNameEl = document.getElementById('fileName');
const loading    = document.getElementById('loading');
const results    = document.getElementById('results');
const resultList = document.getElementById('resultList');
const errorEl    = document.getElementById('error');
const resetBtn   = document.getElementById('resetBtn');

selectBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

/* Drag & Drop */
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

/* Reset */
resetBtn.addEventListener('click', () => {
  fileInput.value = '';
  fileNameEl.textContent = '';
  results.style.display = 'none';
  errorEl.style.display = 'none';
  resetBtn.style.display = 'none';
  dropZone.style.display = '';
});

/* Main */
async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.mp3')) {
    showError('MP3ファイルのみ対応しています');
    return;
  }

  fileNameEl.textContent = file.name;
  dropZone.style.display = 'none';
  results.style.display = 'none';
  errorEl.style.display = 'none';
  resetBtn.style.display = 'none';
  loading.style.display = 'block';

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '解析に失敗しました');
    showResults(data.results);
  } catch (err) {
    showError(err.message);
  } finally {
    loading.style.display = 'none';
  }
}

function showResults(items) {
  resultList.innerHTML = '';
  const maxConf = Math.max(...items.map(r => r.confidence), 1);
  items.forEach(r => {
    const pct = r.confidence.toFixed(1);
    const barW = (r.confidence / maxConf * 100).toFixed(1);
    resultList.innerHTML += `
      <div class="result-item">
        <div class="result-label">
          <span><span class="genre">${esc(r.genre)}</span><span class="parent">${esc(r.parent)}</span></span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:0%"></div></div>
      </div>`;
  });
  results.style.display = 'block';
  resetBtn.style.display = 'block';
  /* animate bars */
  requestAnimationFrame(() => {
    const fills = resultList.querySelectorAll('.bar-fill');
    items.forEach((r, i) => {
      fills[i].style.width = (r.confidence / maxConf * 100).toFixed(1) + '%';
    });
  });
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  resetBtn.style.display = 'block';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
