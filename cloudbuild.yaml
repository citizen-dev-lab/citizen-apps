substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _APP_NAME: hello
  _SERVICE: app-hello
  _WORKFLOW: citizen-deploy
  _GH_OWNER: citizen-dev-lab
  _GH_REPO: citizen-apps

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

steps:
  # ======================================
  # 1) Docker build
  # ======================================
  - name: gcr.io/cloud-builders/docker
    dir: apps/${_APP_NAME}
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - .

  # ======================================
  # 2) Docker push
  # ======================================
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA

  # ======================================
  # 3) Workflow実行 → URL取得 → GitHubコメント
  # ======================================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv: ["GITHUB_TOKEN"]
    env:
      - "PROJECT_ID=$PROJECT_ID"
      - "COMMIT_SHA=$COMMIT_SHA"
      - "_REGION=${_REGION}"
      - "_AR_REPO=${_AR_REPO}"
      - "_SERVICE=${_SERVICE}"
      - "_WORKFLOW=${_WORKFLOW}"
      - "_GH_OWNER=${_GH_OWNER}"
      - "_GH_REPO=${_GH_REPO}"
    args:
      - -ceu
      - |
        chmod +x scripts/deploy_and_comment.sh
        scripts/deploy_and_comment.sh
