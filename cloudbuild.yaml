steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "✅ Cloud Build Trigger Fired!"
        echo "commit: ${COMMIT_SHA}"
        echo "repo:   ${REPO_NAME}"
        echo "branch: ${BRANCH_NAME}"

options:
  logging: CLOUD_LOGGING_ONLY
