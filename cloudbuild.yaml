substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _APP_NAME: hello
  _SERVICE: app-hello
  _WORKFLOW: citizen-deploy
  _GH_OWNER: citizen-dev-lab
  _GH_REPO: citizen-apps

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

steps:
  - name: gcr.io/cloud-builders/docker
    dir: apps/${_APP_NAME}
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv: ["GITHUB_TOKEN"]
    args:
      - -ceu
      - |
        set -o pipefail

        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA"
        echo "IMAGE=$$IMAGE"

        EXEC_NAME="$$(gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{\"region\":\"${_REGION}\",\"serviceName\":\"${_SERVICE}\",\"image\":\"$$IMAGE\"}" \
          --format="value(name)")"

        if [ -z "$$EXEC_NAME" ]; then
          echo "ERROR: could not get execution name"
          exit 1
        fi
        echo "EXEC_NAME=$$EXEC_NAME"

        RESULT=""
        for i in $$(seq 1 60); do
          STATE="$$(gcloud workflows executions describe "$$EXEC_NAME" \
            --location="${_REGION}" \
            --format="value(state)")"

          if [ "$$STATE" = "SUCCEEDED" ]; then
            RESULT="$$(gcloud workflows executions describe "$$EXEC_NAME" \
              --location="${_REGION}" \
              --format="value(result)")"
            break
          fi

          if [ "$$STATE" = "FAILED" ] || [ "$$STATE" = "CANCELLED" ]; then
            echo "Workflow failed: $$STATE"
            gcloud workflows executions describe "$$EXEC_NAME" --location="${_REGION}" --format=json | cat
            exit 1
          fi

          sleep 3
        done

        if [ -z "$$RESULT" ]; then
          echo "ERROR: workflow result not found (timeout?)"
          exit 1
        fi

        URL="$$(echo "$$RESULT" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')"
        echo "URL=$$URL"

        # JSON payload を “1行Python” で生成（YAML破壊しない）
        PAYLOAD="$$(python3 -c 'import json,sys; import os; 
service=os.environ.get("_SERVICE",""); region=os.environ.get("_REGION",""); 
url=os.environ.get("URL",""); image=os.environ.get("IMAGE",""); 
body=f"✅ Deploy completed\\n\\n- service: {service}\\n- region: {region}\\n- url: {url}\\n- image: {image}\\n"; 
print(json.dumps({"body": body}))')"

        curl -sS -X POST \
          -H "Authorization: Bearer $$GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_GH_OWNER}/${_GH_REPO}/commits/$COMMIT_SHA/comments" \
          -d "$$PAYLOAD" | cat

        echo "Posted deploy URL to commit comment."
