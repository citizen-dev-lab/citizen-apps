steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud workflows run citizen-deploy \
          --location=asia-northeast1 \
          --data="{\"commit_sha\":\"${COMMIT_SHA}\"}"

options:
  logging: CLOUD_LOGGING_ONLY
