options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH

steps:
  - name: gcr.io/cloud-builders/git
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        # PRでは shallow checkout で HEAD~1 が無いことがあるため、
        # main を fetch して main...HEAD の差分で判定する
        git fetch --depth=50 origin main

        changed="$(git diff --name-only origin/main...HEAD || true)"
        names="$(echo "$changed" | awk -F/ '$1=="apps"{print $2}' | sort -u)"
        count="$(echo "$names" | sed '/^\s*$/d' | wc -l | tr -d ' ')"

        if [ "$count" -ne 1 ]; then
          echo "ERROR: 1 PR = 1 app only. Found: $names"
          echo "Changed files:"
          echo "$changed"
          exit 1
        fi

        APP="$(echo "$names" | head -n 1)"
        echo "APP=$$APP" > /workspace/app.env
        echo "Detected APP=$$APP"

  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        IMG="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$$APP:$SHORT_SHA"
        docker build -t "$$IMG" "apps/$$APP"
        docker push "$$IMG"
        echo "IMG=$$IMG" >> /workspace/app.env

  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"$$APP\",
            \"image\":\"$$IMG\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$PROJECT_ID\"
          }"

  - name: gcr.io/cloud-builders/curl
    id: enable-automerge
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        # GraphQL内の $owner/$name/$number 等が Cloud Build に置換されないよう $$ にする
        QUERY='query($$owner:String!, $$name:String!, $$number:Int!){repository(owner:$$owner,name:$$name){pullRequest(number:$$number){id}}}'
        PR_ID="$(curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$QUERY\",\"variables\":{\"owner\":\"${_REPO_OWNER}\",\"name\":\"${_REPO_NAME}\",\"number\":${_PR_NUMBER}}}" \
          https://api.github.com/graphql | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['repository']['pullRequest']['id'])")"

        MUT='mutation($$id:ID!, $$method:PullRequestMergeMethod!){enablePullRequestAutoMerge(input:{pullRequestId:$$id, mergeMethod:$$method}){pullRequest{number}}}'
        curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$MUT\",\"variables\":{\"id\":\"$$PR_ID\",\"method\":\"${_MERGE_METHOD}\"}}" \
          https://api.github.com/graphql >/dev/null

        echo "Auto-merge enabled for PR #${_PR_NUMBER}"
