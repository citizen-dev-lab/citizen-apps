options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH
  _STATUS_CONTEXT: cloudbuild/pr-preview-deploy

steps:
  # 1) PRの変更ファイル一覧をGitHub APIから取得して、apps/<app>/ を1つだけ検出
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        # 変更ファイル一覧を安定して取るために main を手元に持ってくる
        git fetch origin main --depth=50 || true

        # main と HEAD の共通祖先を基準に差分を取る（取れなければ HEAD 単体）
        base="$(git merge-base HEAD origin/main 2>/dev/null || true)"
        if [ -n "$base" ]; then
          changed="$(git diff --name-only "$base"...HEAD || true)"
        else
          changed="$(git show --name-only --pretty='' HEAD || true)"
        fi

        app_names="$(echo "$changed" | awk -F/ '$1=="apps"{print $2}' | sort -u)"
        count="$(echo "$app_names" | sed '/^\s*$/d' | wc -l | tr -d ' ')"

        # ★重要：アプリ変更なしは “スキップ” 扱いにする
        if [ "$count" -eq 0 ]; then
          echo "No app changes detected. Skip pr-preview-deploy."
          echo "skip=true" | tee /workspace/app.env
          exit 0
        fi

        # アプリ変更が複数はエラー
        if [ "$count" -ne 1 ]; then
          echo "ERROR: 1 PR = 1 app only. Found: $app_names"
          exit 1
        fi

        APP="$(echo "$app_names" | head -n 1)"
        echo "APP=$APP" | tee /workspace/app.env
        echo "skip=false" | tee -a /workspace/app.env
        echo "Detected APP=$APP"

  # 2) Docker build & push（PROJECT_ID unbound 対策済み）
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env

        # project id を確実に取得
        PROJECT="$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then
          PROJECT="$(gcloud config get-value project 2>/dev/null || true)"
        fi
        if [ -z "$$PROJECT" ]; then
          echo "ERROR: PROJECT_ID is empty"
          exit 1
        fi

        # commit sha を直接取得（SHORT_SHAを使わない）
        SHA="$(git rev-parse --short HEAD)"

        IMG="${_REGION}-docker.pkg.dev/$$PROJECT/${_AR_REPO}/$$APP:$$SHA"
        docker build -t "$$IMG" "apps/$$APP"
        docker push "$$IMG"
        echo "IMG=$$IMG" >> /workspace/app.env

  # 3) Workflows preview 実行（PROJECT_IDを確実に渡す）
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env

        PROJECT="$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then
          PROJECT="$(gcloud config get-value project 2>/dev/null || true)"
        fi
        if [ -z "$$PROJECT" ]; then
          echo "ERROR: PROJECT_ID is empty"
          exit 1
        fi

        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"$$APP\",
            \"image\":\"$$IMG\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$$PROJECT\"
          }"

  # 4) GitHubへ「Commit status」を報告（Branch rulesの Add checks に出すため）
  - name: gcr.io/cloud-builders/gcloud
    id: report-status-success
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        # 環境により SHA 変数名が違うのでフォールバック
        SHA="${COMMIT_SHA:-${REVISION_ID:-}}"
        if [ -z "$$SHA" ]; then
          # 最後の手段：gitから取得
          SHA="$(git rev-parse HEAD 2>/dev/null || true)"
        fi
        if [ -z "$$SHA" ]; then
          echo "ERROR: could not determine commit SHA"
          exit 1
        fi

        payload="$(python3 -c 'import json,os; print(json.dumps({
          "state":"success",
          "context":os.environ.get("_STATUS_CONTEXT","cloudbuild/pr-preview-deploy"),
          "description":"Cloud Build succeeded"
        }))')"

        curl -sS -X POST \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/statuses/$$SHA" \
          -d "$$payload" >/dev/null

        echo "Reported GitHub status: ${_STATUS_CONTEXT} = success for $$SHA"

  # 5) PRのAuto-mergeをAPIでONにする（GitHub側でAllow auto-mergeがONにできるようになってから効く）
  - name: gcr.io/cloud-builders/gcloud
    id: enable-automerge
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        QUERY='query($$owner:String!, $$name:String!, $$number:Int!){repository(owner:$$owner,name:$$name){pullRequest(number:$$number){id}}}'
        PR_ID="$(curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$QUERY\",\"variables\":{\"owner\":\"${_REPO_OWNER}\",\"name\":\"${_REPO_NAME}\",\"number\":${_PR_NUMBER}}}" \
          https://api.github.com/graphql | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['repository']['pullRequest']['id'])")"

        MUT='mutation($$id:ID!, $$method:PullRequestMergeMethod!){enablePullRequestAutoMerge(input:{pullRequestId:$$id, mergeMethod:$$method}){pullRequest{number}}}'
        curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$MUT\",\"variables\":{\"id\":\"$$PR_ID\",\"method\":\"${_MERGE_METHOD}\"}}" \
          https://api.github.com/graphql >/dev/null

        echo "Auto-merge enabled for PR #${_PR_NUMBER}"
