options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH
  _STATUS_CONTEXT: cloudbuild/pr-preview-deploy
  # トリガーから渡されない場合のためのデフォルト値
  _PR_NUMBER: ""

steps:
  # 1) PRの変更ファイル一覧を取得（Pythonのエラー対策済み）
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        files_json="$(curl -sS \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/pulls/${_PR_NUMBER}/files?per_page=100")"

        # Python側でAPIエラーを検知できるよう修正
        echo "$$files_json" | python3 -c '
        import sys, json, re
        data = json.load(sys.stdin)
        if not isinstance(data, list):
            print(f"ERROR: GitHub API returned error: {data}", file=sys.stderr)
            sys.exit(1)
        apps = set()
        for f in data:
            m = re.match(r"apps/([^/]+)/", f.get("filename", ""))
            if m: apps.add(m.group(1))
        print("\n".join(sorted(apps)))
        ' > /workspace/apps.txt

        count="$(grep -v "^[[:space:]]*$$" /workspace/apps.txt | wc -l | tr -d " ")"
        if [ "$$count" -ne 1 ]; then
          echo "ERROR: 1 PR = 1 app only. Found: $$(cat /workspace/apps.txt)"
          exit 1
        fi

        APP="$$(cat /workspace/apps.txt | head -n 1)"
        echo "APP=$$APP" > /workspace/app.env
        echo "Detected APP=$$APP"

  # 2) Docker build & push
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        PROJECT="$$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then PROJECT="$$(gcloud config get-value project)"; fi
        
        SHA="$$(git rev-parse --short HEAD)"
        IMG="${_REGION}-docker.pkg.dev/$$PROJECT/${_AR_REPO}/$$APP:$$SHA"
        
        docker build -t "$$IMG" "apps/$$APP"
        docker push "$$IMG"
        echo "IMG=$$IMG" >> /workspace/app.env

  # 3) Workflows 実行
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        PROJECT="$$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then PROJECT="$$(gcloud config get-value project)"; fi

        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"$$APP\",
            \"image\":\"$$IMG\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$$PROJECT\"
          }"

  # 4) GitHub Commit Status 報告 & 自動マージのトリガー
  # (ここに、前回 404 エラーになった GitHub API への POST 処理などを入れる)
