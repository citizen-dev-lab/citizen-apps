options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH
  _STATUS_CONTEXT: cloudbuild/pr-preview-deploy
  _PR_NUMBER: ""

steps:
  # 1) 対象アプリの検出
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -z "${_PR_NUMBER}" ]; then
          echo "ERROR: _PR_NUMBER is empty."
          exit 1
        fi

        TOKEN_VAL=$$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")

        RESPONSE=$$(curl -sS -H "Authorization: Bearer $$TOKEN_VAL" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/pulls/${_PR_NUMBER}/files?per_page=100")

        echo "$$RESPONSE" | python3 -c '
        import sys, json, re
        data = json.load(sys.stdin)
        if not isinstance(data, list):
            sys.exit(1)
        apps = {m.group(1) for f in data if (m := re.match(r"apps/([^/]+)/", f.get("filename", "")))}
        print("\n".join(sorted(apps)))
        ' > /workspace/apps.txt || (echo "GitHub API Access Error" && exit 1)

        COUNT=$$(grep -v "^[[:space:]]*$$" /workspace/apps.txt | wc -l | tr -d " ")

        if [ "$$COUNT" -eq 0 ]; then
          echo "No app changes detected."
          touch /workspace/SKIP_BUILD
          exit 0
        fi

        DET_APP=$$(cat /workspace/apps.txt | head -n 1)
        echo "APP=$$DET_APP" > /workspace/app.env
        echo "Detected APP=$$DET_APP"

  # 2) Docker build & push
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        
        CUR_PROJECT=$$(gcloud config get-value project)
        CUR_SHA=$$(git rev-parse --short HEAD)
        IMG_NAME="${_REGION}-docker.pkg.dev/$$CUR_PROJECT/${_AR_REPO}/$$APP:$$CUR_SHA"
        
        docker build -t "$$IMG_NAME" "apps/$$APP"
        docker push "$$IMG_NAME"
        echo "IMG=$$IMG_NAME" >> /workspace/app.env

  # 3) Workflows preview 実行
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        CUR_PROJECT=$$(gcloud config get-value project)

        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"$$APP\",
            \"image\":\"$$IMG\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$$CUR_PROJECT\"
          }"

  # 4) GitHub Status 更新 & Auto-merge
  - name: gcr.io/cloud-builders/gcloud
    id: finalize
    entrypoint: bash
    args:
      - -ceu
      - |
        FIN_TOKEN=$$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")
        FIN_SHA=$$(git rev-parse HEAD)

        curl -sS -X POST -H "Authorization: Bearer $$FIN_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/statuses/$$FIN_SHA" \
          -d "{\"state\":\"success\",\"context\":\"${_STATUS_CONTEXT}\",\"description\":\"Cloud Build completed\"}"

        if [ ! -f /workspace/SKIP_BUILD ]; then
          QUERY='query($$o:String!,$$r:String!,$$n:Int!){repository(owner:$$o,name:$$r){pullRequest(number:$$n){id}}}'
          PR_ID=$$(curl -sS -H "Authorization: Bearer $$FIN_TOKEN" \
            -d "{\"query\":\"$$QUERY\",\"variables\":{\"o\":\"${_REPO_OWNER}\",\"r\":\"${_REPO_NAME}\",\"n\":${_PR_NUMBER}}}" \
            https://api.github.com/graphql | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['repository']['pullRequest']['id'])")

          MUTATION='mutation($$id:ID!,$$m:PullRequestMergeMethod!){enablePullRequestAutoMerge(input:{pullRequestId:$$id,mergeMethod:$$m}){pullRequest{number}}}'
          curl -sS -H "Authorization: Bearer $$FIN_TOKEN" \
            -d "{\"query\":\"$$MUTATION\",\"variables\":{\"id\":\"$$PR_ID\",\"m\":\"${_MERGE_METHOD}\"}}" \
            https://api.github.com/graphql
        fi
