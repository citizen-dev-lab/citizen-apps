options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH
  _STATUS_CONTEXT: cloudbuild/pr-preview-deploy

steps:
  # 1) PRの変更ファイル一覧をGitHub APIから取得して apps/<app>/ を検出
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        files_json="$(curl -sS \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/pulls/${_PR_NUMBER}/files?per_page=100")"

        # filename から apps/<app>/ を抽出（安定する multi-line python）
        names="$(printf '%s' "$$files_json" | python3 - <<'PY'
import sys, json, re
data = json.load(sys.stdin)
apps = set()
for f in data:
    fn = f.get("filename", "")
    m = re.match(r"apps/([^/]+)/", fn)
    if m:
        apps.add(m.group(1))
print("\n".join(sorted(apps)))
PY
)"

        # 空行を除去して正確にカウント
        count="$(printf '%s\n' "$$names" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')"

        # ★重要：アプリ変更がないPRはスキップ成功
        if [ "$$count" -eq 0 ]; then
          echo "No app changes detected. Skip pr-preview-deploy."
          printf "skip=true\n" | tee /workspace/app.env
          exit 0
        fi

        # アプリ変更が複数はエラー
        if [ "$$count" -ne 1 ]; then
          echo "ERROR: 1 PR = 1 app only. Found: $$names"
          exit 1
        fi

        APP="$(printf '%s\n' "$$names" | head -n 1)"
        {
          echo "skip=false"
          echo "APP=$$APP"
        } | tee /workspace/app.env
        echo "Detected APP=$$APP"

  # 2) Docker build & push
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        if [ "${skip:-false}" = "true" ]; then
          echo "Skip build (no app changes)."
          exit 0
        fi

        # project id を確実に取得
        PROJECT="$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then
          PROJECT="$(gcloud config get-value project 2>/dev/null || true)"
        fi
        if [ -z "$$PROJECT" ]; then
          echo "ERROR: PROJECT_ID is empty"
          exit 1
        fi

        # commit sha を直接取得（SHORT_SHA を使わない）
        SHA="$(git rev-parse --short HEAD 2>/dev/null || true)"
        if [ -z "$$SHA" ]; then
          echo "ERROR: could not determine short SHA"
          exit 1
        fi

        IMG="${_REGION}-docker.pkg.dev/$$PROJECT/${_AR_REPO}/$$APP:$$SHA"
        docker build -t "$$IMG" "apps/$$APP"
        docker push "$$IMG"
        echo "IMG=$$IMG" >> /workspace/app.env

  # 3) Workflows preview 実行
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        if [ "${skip:-false}" = "true" ]; then
          echo "Skip workflow preview (no app changes)."
          exit 0
        fi

        PROJECT="$PROJECT_ID"
        if [ -z "$$PROJECT" ]; then
          PROJECT="$(gcloud config get-value project 2>/dev/null || true)"
        fi
        if [ -z "$$PROJECT" ]; then
          echo "ERROR: PROJECT_ID is empty"
          exit 1
        fi

        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"$$APP\",
            \"image\":\"$$IMG\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$$PROJECT\"
          }"

  # 4) GitHubへ「Commit status」を報告（必須チェックのため）
  - name: gcr.io/cloud-builders/gcloud
    id: report-status-success
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        SHA="${COMMIT_SHA:-${REVISION_ID:-}}"
        if [ -z "$$SHA" ]; then
          SHA="$(git rev-parse HEAD 2>/dev/null || true)"
        fi
        if [ -z "$$SHA" ]; then
          echo "ERROR: could not determine commit SHA"
          exit 1
        fi

        payload="$(python3 - <<'PY'
import json, os
print(json.dumps({
  "state": "success",
  "context": os.environ.get("_STATUS_CONTEXT", "cloudbuild/pr-preview-deploy"),
  "description": "Cloud Build succeeded"
}))
PY
)"

        curl -sS -X POST \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/statuses/$$SHA" \
          -d "$$payload" >/dev/null

        echo "Reported GitHub status: ${_STATUS_CONTEXT} = success for $$SHA"

  # 5) PRのAuto-mergeをAPIでONにする
  - name: gcr.io/cloud-builders/gcloud
    id: enable-automerge
    entrypoint: bash
    args:
      - -ceu
      - |
        # skip=true のときは auto-merge も不要（設定変更PRなど）
        if [ -f /workspace/app.env ]; then
          source /workspace/app.env
          if [ "${skip:-false}" = "true" ]; then
            echo "Skip enable-automerge (no app changes)."
            exit 0
          fi
        fi

        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        QUERY='query($$owner:String!, $$name:String!, $$number:Int!){repository(owner:$$owner,name:$$name){pullRequest(number:$$number){id}}}'
        PR_ID="$(curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$QUERY\",\"variables\":{\"owner\":\"${_REPO_OWNER}\",\"name\":\"${_REPO_NAME}\",\"number\":${_PR_NUMBER}}}" \
          https://api.github.com/graphql | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['repository']['pullRequest']['id'])")"

        MUT='mutation($$id:ID!, $$method:PullRequestMergeMethod!){enablePullRequestAutoMerge(input:{pullRequestId:$$id, mergeMethod:$$method}){pullRequest{number}}}'
        curl -sS -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d "{\"query\":\"$$MUT\",\"variables\":{\"id\":\"$$PR_ID\",\"method\":\"${_MERGE_METHOD}\"}}" \
          https://api.github.com/graphql >/dev/null

        echo "Auto-merge enabled for PR #${_PR_NUMBER}"
