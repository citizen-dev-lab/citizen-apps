- name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        # APIレスポンスを変数に格納
        files_json="$(curl -sS \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/pulls/${_PR_NUMBER}/files?per_page=100")"

        # デバッグ用：レスポンスがリストでない（エラーの）場合に中身を表示して終了させる
        echo "$$files_json" | python3 -c '
        import sys, json, re
        data = json.load(sys.stdin)
        if not isinstance(data, list):
            print("ERROR: GitHub API returned an error or unexpected format:")
            print(json.dumps(data, indent=2))
            sys.exit(1)

        apps = set()
        for f in data:
            filename = f.get("filename", "")
            m = re.match(r"apps/([^/]+)/", filename)
            if m:
                apps.add(m.group(1))
        
        output = "\n".join(sorted(apps))
        if not output.strip():
            print("ERROR: No app directory (apps/<app>/) detected in PR files.")
            sys.exit(1)
        print(output)
        ' > /tmp/apps_list

        # 結果の判定
        count="$(grep -v '^[[:space:]]*$' /tmp/apps_list | wc -l | tr -d ' ')"
        if [ "$$count" -ne 1 ]; then
          echo "ERROR: 1 PR must touch exactly 1 app. Found: $$(cat /tmp/apps_list)"
          exit 1
        fi

        APP="$$(cat /tmp/apps_list | head -n 1)"
        echo "APP=$$APP" > /workspace/app.env
        echo "Detected APP=$$APP"
