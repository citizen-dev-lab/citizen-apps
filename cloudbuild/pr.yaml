options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
  _MERGE_METHOD: SQUASH
  _STATUS_CONTEXT: cloudbuild/pr-preview-deploy
  # 重要：トリガー設定で $(pull_request.number) を割り当てる必要があります
  _PR_NUMBER: ""

steps:
  # 1) PRの変更ファイルから対象アプリを検出
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -z "${_PR_NUMBER}" ]; then
          echo "ERROR: _PR_NUMBER is empty. Check trigger settings."
          exit 1
        fi

        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"

        # GitHub APIからファイル一覧を取得
        RESPONSE=$(curl -sS -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/pulls/${_PR_NUMBER}/files?per_page=100")

        # Pythonで解析。アプリディレクトリ以外なら空を返す
        echo "$RESPONSE" | python3 -c '
        import sys, json, re
        data = json.load(sys.stdin)
        if not isinstance(data, list):
            print(f"ERROR: API Fail: {data}", file=sys.stderr)
            sys.exit(1)
        apps = {m.group(1) for f in data if (m := re.match(r"apps/([^/]+)/", f.get("filename", "")))}
        print("\n".join(sorted(apps)))
        ' > /workspace/apps.txt || (echo "GitHub API Access Error" && exit 1)

        COUNT=$(grep -v "^[[:space:]]*$" /workspace/apps.txt | wc -l | tr -d " ")

        if [ "$COUNT" -eq 0 ]; then
          echo "No app changes detected. Skipping further steps."
          touch /workspace/SKIP_BUILD
          exit 0
        elif [ "$COUNT" -gt 1 ]; then
          echo "ERROR: Multiple apps detected: $(cat /workspace/apps.txt). 1 PR = 1 App only."
          exit 1
        fi

        APP=$(cat /workspace/apps.txt | head -n 1)
        echo "APP=$APP" > /workspace/app.env
        echo "Detected APP=$APP"

  # 2) Docker build & push (SKIP時は何もしない)
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        
        PROJECT_ID=$(gcloud config get-value project)
        SHA=$(git rev-parse --short HEAD)
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${APP}:${SHA}"
        
        docker build -t "$IMG" "apps/${APP}"
        docker push "$IMG"
        echo "IMG=$IMG" >> /workspace/app.env

  # 3) Workflows preview 実行 (SKIP時は何もしない)
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-preview
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        PROJECT_ID=$(gcloud config get-value project)

        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"preview\",
            \"appName\":\"${APP}\",
            \"image\":\"${IMG}\",
            \"prNumber\":${_PR_NUMBER},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"${PROJECT_ID}\"
          }"

  # 4) GitHub Status 更新 & Auto-merge 有効化
  - name: gcr.io/cloud-builders/gcloud
    id: finalize
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")"
        SHA=$(git rev-parse HEAD)

        # 1. GitHub Status を success に更新 (Required Checkを通すため)
        curl -sS -X POST -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/statuses/${SHA}" \
          -d "{\"state\":\"success\",\"context\":\"${_STATUS_CONTEXT}\",\"description\":\"Cloud Build completed\"}"

        # 2. Skipしていない場合のみ Auto-merge を有効化
        if [ ! -f /workspace/SKIP_BUILD ]; then
          QUERY='query($o:String!,$r:String!,$n:Int!){repository(owner:$o,name:$r){pullRequest(number:$n){id}}}'
          PR_ID=$(curl -sS -H "Authorization: Bearer $TOKEN" \
            -d "{\"query\":\"$QUERY\",\"variables\":{\"o\":\"${_REPO_OWNER}\",\"r\":\"${_REPO_NAME}\",\"n\":${_PR_NUMBER}}}" \
