options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps

steps:
  - name: gcr.io/cloud-builders/git
    id: detect-app-and-pr
    entrypoint: bash
    args:
      - -ceu
      - |
        # --- ensure git history exists (Cloud Build may shallow-clone) ---
        git config --global --add safe.directory /workspace || true

        # If shallow, unshallow; otherwise fetch a bit of history (safe either way)
        if [ "$(git rev-parse --is-shallow-repository 2>/dev/null || echo false)" = "true" ]; then
          git fetch --unshallow origin || git fetch --depth=50 origin
        else
          git fetch --depth=50 origin || true
        fi

        # Use first-parent diff (stable for merge commits/squash commits)
        base="$(git rev-parse HEAD^1)"
        changed="$(git diff --name-only "${base}..HEAD" || true)"

        app_names="$(echo "$changed" | awk -F/ '$1=="apps"{print $2}' | sort -u)"
        count="$(echo "$app_names" | sed '/^\s*$/d' | wc -l | tr -d ' ')"
        if [ "$count" -ne 1 ]; then
          echo "ERROR: main deploy expects exactly 1 app change. Found: $app_names"
          exit 1
        fi
        app_name="$(echo "$app_names" | head -n 1)"

        msg="$(git log -1 --pretty=%B)"
        pr_number="$(echo "$msg" | sed -n 's/.*#\([0-9][0-9]*\).*/\1/p' | head -n 1 || true)"
        if [ -z "$pr_number" ]; then
          echo "ERROR: Could not detect PR number from commit message."
          echo "Commit message was:"
          echo "$msg"
          exit 1
        fi

        short_sha="$(git rev-parse --short HEAD)"

        {
          echo "app_name=$app_name"
          echo "pr_number=$pr_number"
          echo "short_sha=$short_sha"
        } | tee /workspace/app.env

  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${app_name}:${short_sha}"
        docker build -t "$image" "apps/${app_name}"
        docker push "$image"
        echo "image=$image" | tee -a /workspace/app.env

  - name: gcr.io/cloud-builders/gcloud
    id: workflow-prod
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/app.env
        gcloud workflows run "${_WORKFLOW}" \
          --location="${_REGION}" \
          --data="{
            \"mode\":\"prod\",
            \"appName\":\"${app_name}\",
            \"image\":\"${image}\",
            \"prNumber\":${pr_number},
            \"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",
            \"repoOwner\":\"${_REPO_OWNER}\",
            \"repoName\":\"${_REPO_NAME}\",
            \"region\":\"${_REGION}\",
            \"projectId\":\"$PROJECT_ID\"
          }"
