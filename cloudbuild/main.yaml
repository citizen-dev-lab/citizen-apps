options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: asia-northeast1
  _AR_REPO: citizen-dev-lab
  _WORKFLOW: citizen-deploy
  _GITHUB_TOKEN_SECRET: github-token
  _REPO_OWNER: citizen-dev-lab
  _REPO_NAME: citizen-apps
steps:
  - name: gcr.io/cloud-builders/gcloud
    id: detect-app-main
    entrypoint: bash
    args:
      - -ceu
      - |
        git fetch --unshallow || git fetch --depth=2
        FILES=$$(git diff --name-only HEAD^ HEAD)
        APPS=$$(echo "$$FILES" | grep '^apps/' | cut -d/ -f2 | sort -u || true)
        COUNT=$$(echo "$$APPS" | grep -v "^[[:space:]]*$$" | wc -l | tr -d " ")
        if [ "$$COUNT" -eq 0 ]; then touch /workspace/SKIP_BUILD; exit 0; fi
        echo "APP=$$APPS" > /workspace/app.env
  - name: gcr.io/cloud-builders/docker
    id: build-prod
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        BASE_IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/$$APP"
        docker build -t "$${BASE_IMG}:${SHORT_SHA}" -t "$${BASE_IMG}:latest" "apps/$$APP"
        docker push "$${BASE_IMG}:${SHORT_SHA}"
        docker push "$${BASE_IMG}:latest"
        echo "IMG=$${BASE_IMG}:${SHORT_SHA}" >> /workspace/app.env
  - name: gcr.io/cloud-builders/gcloud
    id: workflow-prod
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        gcloud workflows run "${_WORKFLOW}" --location="${_REGION}" \
          --data="{\"mode\":\"prod\",\"appName\":\"$$APP\",\"image\":\"$$IMG\",\"githubTokenSecret\":\"${_GITHUB_TOKEN_SECRET}\",\"repoOwner\":\"${_REPO_OWNER}\",\"repoName\":\"${_REPO_NAME}\",\"region\":\"${_REGION}\",\"projectId\":\"${PROJECT_ID}\"}"

- name: gcr.io/cloud-builders/gcloud
    id: finalize-main
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -f /workspace/SKIP_BUILD ]; then exit 0; fi
        source /workspace/app.env
        # 1. 前のステップのログから URL を抽出（または gcloud で再取得）
        FINAL_URL=$(gcloud run services describe "$$APP" --platform managed --region "${_REGION}" --format='value(status.url)' 2>/dev/null || echo "URL取得失敗")
        
        # 2. トークンを取得
        TOKEN_VAL=$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}")
        
        # 3. メッセージ作成
        MSG="✅ **本番環境へのデプロイが完了しました！**\n\n**URL:** ${FINAL_URL}"
        PAYLOAD=$(python3 -c "import json; print(json.dumps({'body': \"$${MSG}\"}))")
        
        # 4. コミットに対して直接コメントを投稿
        curl -sS -X POST -H "Authorization: token $${TOKEN_VAL}" \
          "https://api.github.com/repos/${_REPO_OWNER}/${_REPO_NAME}/commits/${COMMIT_SHA}/comments" \
          -d "$${PAYLOAD}"
